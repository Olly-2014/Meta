      function moveDrag(clientX, clientY){
        if(!dragging) return;
        var wrapRect = textLayer.getBoundingClientRect();
        var x = ((clientX - offX - wrapRect.left) / wrapRect.width) * 100;
        var y = ((clientY - offY - wrapRect.top) / wrapRect.height) * 100;
        x = Math.max(4, Math.min(96, x));
        y = Math.max(4, Math.min(96, y));
        box.style.left = x + "%";
        box.style.top = y + "%";
        ov.x = x; ov.y = y;
      }
      function endDrag(){ dragging = false; }

      box.addEventListener("touchstart", function(e){ startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
      box.addEventListener("touchmove", function(e){ moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
      box.addEventListener("touchend", endDrag);
      box.addEventListener("mousedown", function(e){ startDrag(e.clientX, e.clientY); });
      window.addEventListener("mousemove", function(e){ moveDrag(e.clientX, e.clientY); });
      window.addEventListener("mouseup", endDrag);

      return box;
    }

    function setActiveBox(box, ov){
      textLayer.querySelectorAll(".editor-textbox").forEach(function(b){ b.classList.remove("editing"); });
      box.classList.add("editing");
      activeBox = { box: box, ov: ov };
      var colorRow = el("editor-color-row");
      colorRow.style.display = "flex";
      colorRow.innerHTML = TEXT_COLORS.map(function(c){
        return '<div class="editor-color-swatch ' + (ov.color === c ? "selected" : "") + '" style="background:' + c + ';" data-color="' + c + '"></div>';
      }).join("") + '<div class="editor-color-swatch" style="background:transparent;border-color:var(--danger);display:flex;align-items:center;justify-content:center;color:var(--danger);font-size:14px;" id="editor-del-text">&times;</div>';
      colorRow.querySelectorAll("[data-color]").forEach(function(sw){
        sw.addEventListener("click", function(){
          var c = sw.getAttribute("data-color");
          ov.color = c;
          box.style.color = c;
          colorRow.querySelectorAll(".editor-color-swatch").forEach(function(s){ s.classList.remove("selected"); });
          sw.classList.add("selected");
        });
      });
      el("editor-del-text").addEventListener("click", function(){
        box.remove();
        localOverlays = localOverlays.filter(function(o){ return o.id !== ov.id; });
        colorRow.style.display = "none";
        activeBox = null;
      });
    }

    localOverlays.forEach(drawOverlay);

    el("editor-add-text").addEventListener("click", function(){
      var ov = { id: "t" + Date.now(), text: "Testo", x: 50, y: 50, color: "#ffffff" };
      localOverlays.push(ov);
      var box = drawOverlay(ov);
      setActiveBox(box, ov);
      box.focus();
      document.execCommand && document.execCommand("selectAll", false, null);
    });

    function cleanup(){
      URL.revokeObjectURL(url);
      screen.classList.remove("active");
      screen.innerHTML = "";
    }

    el("editor-cancel").addEventListener("click", function(){
      cleanup();
    });
    el("editor-done").addEventListener("click", function(){
      uploadState.filterName = currentFilter;
      uploadState.textOverlays = localOverlays.filter(function(o){ return o.text && o.text.trim(); });
      cleanup();
    });
  }

  function doPublish(container){
    var title = el("video-title").value.trim();
    var isGroup = uploadState.photoGroup && uploadState.photoGroup.length > 1;
    if(!isGroup && !uploadState.file){ alert(uploadState.mediaType === "photo" ? "Scegli una foto." : "Scegli un file video."); return; }
    if(!title){ alert("Inserisci un titolo."); return; }
    if(uploadState.publishMode === "channel" && !uploadState.channelId){ alert("Seleziona un canale."); return; }
    var description = el("video-desc").value.trim();

    container.innerHTML = '<div class="progress-ring-wrap"><div class="spinner"></div><p style="color:var(--text-muted);font-size:13.5px;">Caricamento in corso...</p></div>';

    function insertVideoRow(videoUrl, thumbUrl, duration, filterName, textOverlays, mediaGroup){
      sb.from("videos").insert({
        channel_id: uploadState.publishMode === "channel" ? uploadState.channelId : null,
        owner_id: uploadState.publishMode === "profile" ? state.session.user.id : null,
        title: title,
        description: description,
        video_url: videoUrl,
        thumbnail_url: thumbUrl,
        duration_seconds: Math.round(duration || 0),
        is_short: mediaGroup ? false : !!uploadState.isShort,
        media_type: uploadState.mediaType,
        filter_name: filterName || "none",
        text_overlays: textOverlays || [],
        media_group: mediaGroup || null
      }).select().single().then(function(res){
        if(res.error){
          container.innerHTML = emptyState("Errore: " + res.error.message);
          return;
        }
        state.history = [];
        showView("video", false);
        openVideo(res.data.id);
      });
    }

    if(isGroup){
      var group = uploadState.photoGroup;
      var uploadedItems = [];
      var i = 0;
      function uploadNext(){
        if(i >= group.length){
          var first = uploadedItems[0];
          insertVideoRow(first.url, first.url, 0, first.filter_name, first.text_overlays, uploadedItems);
          return;
        }
        var item = group[i];
        var ext = item.file.name.split(".").pop();
        var path = state.session.user.id + "/" + Date.now() + "_" + i + "." + ext;
        sb.storage.from("videos").upload(path, item.file).then(function(uploadRes){
          if(uploadRes.error){
            container.innerHTML = emptyState("Errore durante il caricamento: " + uploadRes.error.message);
            return;
          }
          var url = sb.storage.from("videos").getPublicUrl(path).data.publicUrl;
          uploadedItems.push({ url: url, filter_name: item.filterName || "none", text_overlays: item.textOverlays || [] });
          i += 1;
          uploadNext();
        });
      }
      uploadNext();
      return;
    }

    var file = uploadState.file;
    var ext = file.name.split(".").pop();
    var path = state.session.user.id + "/" + Date.now() + "." + ext;

    if(uploadState.mediaType === "photo"){
      sb.storage.from("videos").upload(path, file).then(function(uploadRes){
        if(uploadRes.error){
          container.innerHTML = emptyState("Errore durante il caricamento: " + uploadRes.error.message);
          return;
        }
        var photoUrl = sb.storage.from("videos").getPublicUrl(path).data.publicUrl;
        insertVideoRow(photoUrl, photoUrl, 0, uploadState.filterName, uploadState.textOverlays, null);
      });
      return;
    }

    generateThumbnail(file, function(thumbBlob, duration){
      container.innerHTML = '<div class="progress-ring-wrap"><div class="spinner"></div><p style="color:var(--text-muted);font-size:13.5px;">Ottimizzazione video...</p></div>';
      compressVideoFile(file, function(finalFile){
        container.innerHTML = '<div class="progress-ring-wrap"><div class="spinner"></div><p style="color:var(--text-muted);font-size:13.5px;">Caricamento in corso...</p></div>';
        var finalExt = finalFile.name.split(".").pop();
        var finalPath = state.session.user.id + "/" + Date.now() + "." + finalExt;
        sb.storage.from("videos").upload(finalPath, finalFile).then(function(uploadRes){
          if(uploadRes.error){
            container.innerHTML = emptyState("Errore durante il caricamento: " + uploadRes.error.message);
            return;
          }
          var videoUrl = sb.storage.from("videos").getPublicUrl(finalPath).data.publicUrl;
          if(!thumbBlob){
            insertVideoRow(videoUrl, null, duration, uploadState.filterName, uploadState.textOverlays, null);
            return;
          }
          var thumbPath = state.session.user.id + "/" + Date.now() + "_thumb.jpg";
          sb.storage.from("thumbnails").upload(thumbPath, thumbBlob).then(function(thumbRes){
            var thumbUrl = null;
            if(!thumbRes.error){
              thumbUrl = sb.storage.from("thumbnails").getPublicUrl(thumbPath).data.publicUrl;
            }
            insertVideoRow(videoUrl, thumbUrl, duration, uploadState.filterName, uploadState.textOverlays, null);
          });
        });
      });
    });
  }

  function compressVideoFile(file, callback){
    var callbackFired = false;
    function safeCallback(resultFile){
      if(callbackFired) return;
      callbackFired = true;
      clearTimeout(hardTimeout);
      callback(resultFile);
    }
    var hardTimeout = setTimeout(function(){
      safeCallback(file);
    }, 15000);

    try{
      if(!("MediaRecorder" in window) || !HTMLVideoElement.prototype.captureStream){
        safeCallback(file); return;
      }
      var mimeCandidates = ["video/mp4;codecs=h264", "video/mp4"];
      var chosenMime = null;
      for(var i=0;i<mimeCandidates.length;i++){
        if(MediaRecorder.isTypeSupported(mimeCandidates[i])){ chosenMime = mimeCandidates[i]; break; }
      }
      if(!chosenMime){ safeCallback(file); return; }
      if(file.size < 3 * 1024 * 1024){ safeCallback(file); return; }

      var videoEl = document.createElement("video");
      videoEl.muted = false;
      videoEl.playsInline = true;
      var url = URL.createObjectURL(file);
      videoEl.src = url;
      var settled = false;
      function done(resultFile){
        if(settled) return;
        settled = true;
        try{ URL.revokeObjectURL(url); }catch(e){}
        safeCallback(resultFile);
      }

      videoEl.addEventListener("loadedmetadata", function(){
        if(!isFinite(videoEl.duration) || videoEl.duration <= 0 || videoEl.duration > 120){
          done(file); return;
        }
        var maxW = 1280;
        var scale = Math.min(1, maxW / videoEl.videoWidth);
        var w = Math.round((videoEl.videoWidth || 640) * scale);
        var h = Math.round((videoEl.videoHeight || 360) * scale);
        if(w <= 0 || h <= 0){ done(file); return; }

        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext("2d");

        var canvasStream;
        try{ canvasStream = canvas.captureStream(30); }
        catch(e){ done(file); return; }

        try{
          var audioSource = videoEl.captureStream ? videoEl.captureStream() : null;
          if(audioSource){
            audioSource.getAudioTracks().forEach(function(t){ canvasStream.addTrack(t); });
          }
        } catch(e){ /* continue without audio */ }

        var recorder;
        try{
          recorder = new MediaRecorder(canvasStream, { mimeType: chosenMime, videoBitsPerSecond: 1500000 });
        } catch(e){ done(file); return; }

        var chunks = [];
        recorder.ondataavailable = function(e){ if(e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.onerror = function(){ done(file); };
        recorder.onstop = function(){
          if(chunks.length === 0){ done(file); return; }
          var blob = new Blob(chunks, { type: chosenMime.split(";")[0] });
          if(blob.size === 0 || blob.size >= file.size){ done(file); return; }
          var newFile = new File([blob], "compressed.mp4", { type: "video/mp4" });
          done(newFile);
        };

        var drawing = true;
        function drawFrame(){
          if(!drawing) return;
          try{ ctx.drawImage(videoEl, 0, 0, w, h); } catch(e){}
          requestAnimationFrame(drawFrame);
        }

        videoEl.addEventListener("ended", function(){
          drawing = false;
          setTimeout(function(){ try{ recorder.stop(); }catch(e){ done(file); } }, 200);
        });

        recorder.start();
        videoEl.currentTime = 0;
        var playPromise = videoEl.play();
        if(playPromise && playPromise.then){
          playPromise.then(function(){ drawFrame(); }).catch(function(){ done(file); });
        } else {
          drawFrame();
        }

        setTimeout(function(){
          if(!settled){
            drawing = false;
            try{ recorder.stop(); }catch(e){ done(file); }
          }
        }, (videoEl.duration + 6) * 1000);
      });

      videoEl.addEventListener("error", function(){ done(file); });
    } catch(e){
      safeCallback(file);
    }
  }

  function generateThumbnail(file, callback){
    try{
      var videoEl = document.createElement("video");
      videoEl.preload = "metadata";
      videoEl.muted = true;
      videoEl.playsInline = true;
      var url = URL.createObjectURL(file);
      videoEl.src = url;
      var settled = false;
      videoEl.addEventListener("loadedmetadata", function(){
        var duration = videoEl.duration;
        var seekTo = Math.min(1, duration / 2);
        videoEl.currentTime = seekTo;
      });
      videoEl.addEventListener("seeked", function(){
        if(settled) return;
        settled = true;
        try{
          var canvas = document.createElement("canvas");
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 360;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(function(blob){
            URL.revokeObjectURL(url);
            callback(blob, videoEl.duration);
          }, "image/jpeg", 0.82);
        } catch(e){
          URL.revokeObjectURL(url);
          callback(null, videoEl.duration || 0);
        }
      });
      videoEl.addEventListener("error", function(){
        if(settled) return;
        settled = true;
        URL.revokeObjectURL(url);
        callback(null, 0);
      });
      setTimeout(function(){
        if(!settled){
          settled = true;
          URL.revokeObjectURL(url);
          callback(null, 0);
        }
      }, 8000);
    } catch(e){
      callback(null, 0);
    }
  }

  window.addEventListener("scroll", function(){
    if(state.currentView !== "home") return;
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 400){
      loadMoreHomeFeed();
    }
  });

  /* ---------------- Boot ---------------- */
  sb.auth.getSession().then(function(res){
    if(res.data && res.data.session){
      onAuthReady(res.data.session);
    } else {
      el("auth-screen").classList.remove("hidden");
    }
    startUsageTracking();
    checkUsageLock();
    subscribeToLiveFeed();
  });

  sb.auth.onAuthStateChange(function(event, session){
    if(event === "SIGNED_OUT"){
      state.session = null;
    }
  });

  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  }

})();
</script>
