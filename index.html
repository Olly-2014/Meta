<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#060a12;
    --bg-elevated:#0b1220;
    --glass:rgba(255,255,255,0.055);
    --glass-strong:rgba(255,255,255,0.09);
    --border:rgba(255,255,255,0.09);
    --ember:#3d8bff;
    --ember-dim:rgba(61,139,255,0.15);
    --violet:#7c5cff;
    --text:#f5f5f7;
    --text-muted:#8b8b93;
    --text-faint:#55555d;
    --danger:#ff4d4d;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overscroll-behavior-y:none;}
  body{padding-top:var(--safe-top);}
  ::-webkit-scrollbar{display:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}

  #app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:calc(84px + var(--safe-bottom));}

  /* ---------- Top bar ---------- */
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:rgba(8,8,12,0.72);backdrop-filter:blur(24px) saturate(180%);
    border-bottom:1px solid var(--border);}
  .logo{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:700;font-size:20px;letter-spacing:-0.02em;}
  .rec-dot{width:9px;height:9px;border-radius:50%;background:var(--ember);box-shadow:0 0 0 0 rgba(61,139,255,0.6);animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,139,255,0.55);}
    70%{box-shadow:0 0 0 8px rgba(61,139,255,0);}
    100%{box-shadow:0 0 0 0 rgba(61,139,255,0);}
  }
  .icon-btn{width:38px;height:38px;border-radius:12px;background:var(--glass-strong);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--text);}
  .back-row{display:flex;align-items:center;gap:10px;}

  /* ---------- Glass ---------- */
  .glass{background:var(--glass);border:1px solid var(--border);border-radius:18px;}
  .glass-strong{background:var(--glass-strong);border:1px solid var(--border);border-radius:18px;}

  /* ---------- Bottom nav ---------- */
  .bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;z-index:50;
    display:flex;align-items:center;justify-content:space-around;
    padding:10px 10px calc(10px + var(--safe-bottom));
    background:rgba(10,10,15,0.78);backdrop-filter:blur(28px) saturate(180%);
    border-top:1px solid var(--border);}
  .navbtn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text-faint);
    padding:6px 10px;border-radius:12px;transition:color .15s;}
  .navbtn.active{color:var(--text);}
  .navbtn svg{width:22px;height:22px;}
  .icon-btn svg{width:18px;height:18px;}
  .navbtn span{font-size:10px;font-weight:600;letter-spacing:0.01em;}
  .fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ember),#6eb4ff);
    display:flex;align-items:center;justify-content:center;margin-top:-26px;box-shadow:0 8px 24px rgba(61,139,255,0.35);
    border:3px solid var(--bg);color:#ffffff;}
  .fab svg{width:24px;height:24px;}

  /* ---------- Screens ---------- */
  .screen{padding:16px 16px 24px;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .hidden{display:none !important;}

  h1.page-title{font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-0.02em;margin:4px 0 18px;}

  /* ---------- Search ---------- */
  .search-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:16px;}
  .search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;}
  .search-bar input::placeholder{color:var(--text-faint);}
  .search-bar svg{width:18px;height:18px;color:var(--text-faint);flex-shrink:0;}

  /* ---------- Video card (feed) ---------- */
  .video-card{margin-bottom:20px;}
  .video-card.live-new{animation:liveIn .5s ease;}
  @keyframes liveIn{from{opacity:0;transform:translateY(-12px);background:var(--ember-dim);}to{opacity:1;transform:translateY(0);}}
  .thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#141420;}
  .thumb-wrap img,.thumb-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1a1a28,#0e0e16);}
  .thumb-placeholder svg{width:34px;height:34px;color:var(--text-faint);}
  .duration-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.75);color:#fff;font-size:11px;
    padding:2px 6px;border-radius:6px;font-family:'IBM Plex Mono';z-index:2;}
  .vc-delete-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
    background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;z-index:2;}
  .vc-delete-btn svg{width:15px;height:15px;}
  .feed-preview-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#000;}
  .vc-meta{display:flex;gap:10px;margin-top:10px;align-items:flex-start;}
  .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:700;font-size:14px;color:#fff;}
  .vc-text{flex:1;min-width:0;}
  .vc-title{font-size:15px;font-weight:600;line-height:1.35;margin:0 0 3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .vc-sub{font-size:12.5px;color:var(--text-muted);}
  .vc-sub .dot{margin:0 5px;}

  /* ---------- Buttons / forms ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:14px;
    border:none;font-weight:600;font-size:14.5px;width:100%;}
  .btn-primary{background:var(--ember);color:#ffffff;}
  .btn-ghost{background:var(--glass);color:var(--text);border:1px solid var(--border);}
  .btn-violet{background:var(--violet);color:#fff;}
  .btn-danger-outline{background:none;border:1px solid rgba(255,77,77,0.4);color:var(--danger);}
  .btn-sm{width:auto;padding:9px 16px;font-size:13px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-muted);margin-bottom:6px;font-weight:600;}
  .field input,.field textarea{width:100%;padding:13px 14px;border-radius:14px;background:var(--glass);
    border:1px solid var(--border);color:var(--text);font-size:15px;outline:none;}
  .field textarea{resize:none;min-height:80px;}
  .field input:focus,.field textarea:focus{border-color:rgba(61,139,255,0.5);}

  /* ---------- Auth ---------- */
  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px;}
  .auth-hero{text-align:center;margin-bottom:32px;}
  .auth-hero .logo{justify-content:center;font-size:28px;margin-bottom:8px;}
  .auth-hero p{color:var(--text-muted);font-size:14px;}
  .auth-toggle{display:flex;gap:6px;background:var(--glass);border-radius:14px;padding:4px;margin-bottom:22px;}
  .auth-toggle button{flex:1;padding:10px;border:none;background:none;border-radius:11px;color:var(--text-muted);font-weight:600;font-size:14px;}
  .auth-toggle button.active{background:var(--glass-strong);color:var(--text);}
  .auth-error{color:var(--danger);font-size:13px;margin-bottom:12px;}

  /* ---------- Channel header ---------- */
  .channel-header{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 0 20px;}
  .channel-avatar-lg{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:700;font-size:30px;color:#fff;margin-bottom:14px;}
  .channel-name{font-family:'Space Grotesk';font-size:21px;font-weight:700;}
  .channel-handle{color:var(--text-muted);font-size:13px;margin-top:2px;}
  .channel-stats{color:var(--text-muted);font-size:13px;margin-top:8px;font-family:'IBM Plex Mono';}
  .channel-desc{color:var(--text-muted);font-size:13.5px;margin-top:10px;max-width:400px;line-height:1.5;}
  .channel-actions{margin-top:16px;display:flex;gap:10px;}

  /* ---------- Video page ---------- */
  .player-wrap{width:100%;border-radius:0;background:#000;position:sticky;top:0;z-index:5;}
  .media-text-overlay{position:absolute;transform:translate(-50%,-50%);font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,0.55);
    pointer-events:none;font-size:clamp(13px,4vw,26px);max-width:90%;text-align:center;line-height:1.2;}
  .player-wrap video{width:100%;display:block;max-height:56vh;background:#000;}
  .carousel-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .carousel-track::-webkit-scrollbar{display:none;}
  .carousel-slide{flex:0 0 100%;scroll-snap-align:center;position:relative;display:flex;align-items:center;justify-content:center;background:#000;}
  .carousel-slide img{width:100%;max-height:70vh;object-fit:contain;display:block;}
  .carousel-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:4;}
  .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);transition:width .15s,background .15s;}
  .carousel-dot.active{background:#fff;width:16px;border-radius:3px;}
  .gallery-badge{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;z-index:2;}
  .gallery-badge svg{width:13px;height:13px;}
  .vp-title{font-family:'Space Grotesk';font-size:19px;font-weight:700;margin:16px 0 6px;line-height:1.3;}
  .vp-sub{color:var(--text-muted);font-size:13px;font-family:'IBM Plex Mono';}
  .vp-channel-row{display:flex;align-items:center;gap:12px;margin:18px 0;}
  .vp-actions{display:flex;gap:10px;margin:16px 0;}
  .like-btn{display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:14px;border:1px solid var(--border);
    background:var(--glass);color:var(--text);font-weight:600;font-size:14px;}
  .like-btn.liked{background:var(--ember-dim);border-color:rgba(61,139,255,0.4);color:var(--ember);}
  .like-btn svg{width:18px;height:18px;}
  .vp-desc{background:var(--glass);border-radius:16px;padding:14px;font-size:13.5px;color:var(--text-muted);line-height:1.5;margin:14px 0;}

  /* ---------- Comments ---------- */
  .comment-form{display:flex;gap:10px;align-items:center;margin:18px 0;}
  .comment-form input{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:11px 16px;
    color:var(--text);font-size:14px;outline:none;}
  .comment-form button{background:var(--ember);border:none;border-radius:20px;padding:11px 16px;color:#ffffff;font-weight:700;font-size:13px;}
  .comment{display:flex;gap:10px;margin-bottom:16px;}
  .comment .avatar{width:30px;height:30px;font-size:12px;}
  .comment-body{flex:1;}
  .comment-author{font-size:13px;font-weight:600;}
  .comment-time{font-size:11px;color:var(--text-faint);margin-left:6px;font-weight:400;font-family:'IBM Plex Mono';}
  .comment-text{font-size:13.5px;color:#dcdce0;margin-top:2px;line-height:1.4;}

  /* ---------- Empty states ---------- */
  .empty{text-align:center;padding:60px 20px;color:var(--text-faint);}
  .empty svg{width:40px;height:40px;margin-bottom:14px;opacity:0.5;}
  .empty p{font-size:14px;}

  /* ---------- Upload ---------- */
  .upload-drop{border:1.5px dashed var(--border);border-radius:18px;padding:36px 20px;text-align:center;margin-bottom:18px;}
  .upload-drop svg{width:30px;height:30px;color:var(--text-faint);margin-bottom:10px;}
  .upload-drop p{font-size:13.5px;color:var(--text-muted);}
  .upload-drop.has-file{border-style:solid;border-color:rgba(61,139,255,0.4);}
  .progress-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 0;gap:16px;}
  .spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(61,139,255,0.2);border-top-color:var(--ember);
    animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .channel-select{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;}
  .channel-chip{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 14px 8px 8px;border-radius:20px;
    background:var(--glass);border:1px solid var(--border);font-size:13px;font-weight:600;white-space:nowrap;}
  .channel-chip.selected{border-color:var(--ember);background:var(--ember-dim);color:var(--ember);}
  .channel-chip .avatar{width:24px;height:24px;font-size:10px;}

  .row-between{display:flex;justify-content:space-between;align-items:center;}
  .section-title{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin:22px 0 12px;}
  .list-channel{display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:8px;}
  .list-channel .avatar{width:44px;height:44px;font-size:16px;}

  .notif-item{display:flex;align-items:flex-start;gap:12px;padding:14px;margin-bottom:8px;position:relative;}
  .notif-item.unread{background:var(--glass-strong);}
  .notif-item .notif-icon{width:38px;height:38px;border-radius:50%;background:var(--ember-dim);color:var(--ember);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .notif-item .notif-icon svg{width:18px;height:18px;}
  .notif-text{flex:1;font-size:13.5px;line-height:1.4;color:#e8e8ea;}
  .notif-time{font-size:11.5px;color:var(--text-faint);margin-top:3px;font-family:'IBM Plex Mono';}
  .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--ember);flex-shrink:0;margin-top:6px;}

  /* ---------- Shorts ---------- */
  .shorts-rail{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:22px;-webkit-overflow-scrolling:touch;}
  .trending-rail{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;margin-bottom:22px;-webkit-overflow-scrolling:touch;}
  .trending-rail::-webkit-scrollbar{display:none;}
  .trending-rail .video-card{flex:0 0 220px;margin-bottom:0;}
  .shorts-rail::-webkit-scrollbar{display:none;}
  .short-card{flex-shrink:0;width:118px;aspect-ratio:9/16;border-radius:16px;overflow:hidden;position:relative;background:#141420;}
  .short-card img,.short-card video{width:100%;height:100%;object-fit:cover;display:block;}
  .short-card .short-title{position:absolute;bottom:0;left:0;right:0;padding:8px;font-size:11.5px;font-weight:600;color:#fff;
    background:linear-gradient(to top, rgba(0,0,0,0.75), transparent);line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .short-card .short-play{position:absolute;top:8px;right:8px;width:20px;height:20px;color:#fff;opacity:0.9;}
  .shorts-header{display:flex;align-items:center;gap:8px;margin:22px 0 12px;}
  .shorts-header svg{width:18px;height:18px;color:var(--ember);}
  .shorts-header span{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;}

  #shorts-viewer{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;}
  #shorts-viewer.active{display:flex;}
  .shorts-slide{position:relative;width:100%;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .shorts-slide video{width:100%;height:100%;object-fit:contain;background:#000;}
  .shorts-close{position:absolute;top:calc(var(--safe-top) + 14px);left:16px;z-index:5;width:36px;height:36px;border-radius:50%;
    background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;border:none;}
  .shorts-info{position:absolute;left:16px;right:80px;bottom:calc(var(--safe-bottom) + 26px);color:#fff;z-index:5;}
  .shorts-info .sh-channel{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:8px;}
  .shorts-info .sh-title{font-size:13.5px;line-height:1.4;color:#f0f0f2;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .shorts-actions{position:absolute;right:12px;bottom:calc(var(--safe-bottom) + 26px);display:flex;flex-direction:column;
    align-items:center;gap:22px;z-index:5;}
  .shorts-actions button{background:none;border:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .shorts-actions svg{width:28px;height:28px;}
  .shorts-actions span{font-size:11px;font-weight:600;}
  .shorts-actions .liked svg{color:var(--ember);}
  .shorts-tap-zone{position:absolute;inset:0;z-index:2;}
  .shorts-mute-icon{position:absolute;top:calc(var(--safe-top) + 60px);right:16px;width:38px;height:38px;border-radius:50%;
    background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:5;
    opacity:1;transition:opacity .3s;pointer-events:none;}
  .shorts-mute-icon svg{width:19px;height:19px;}
  .shorts-mute-icon #mute-slash{display:block;}
  .shorts-mute-icon.unmuted #mute-slash{display:none;}
  .shorts-mute-icon.faded{opacity:0;}
  .shorts-progress{position:absolute;top:var(--safe-top);left:0;right:0;display:flex;gap:4px;padding:10px 12px;z-index:5;}

  .shorts-comments-sheet{position:fixed;left:0;right:0;bottom:0;max-height:68vh;background:var(--bg-elevated);
    border-radius:20px 20px 0 0;z-index:260;display:none;flex-direction:column;
    padding-bottom:var(--safe-bottom);box-shadow:0 -10px 40px rgba(0,0,0,0.5);}
  .shorts-comments-sheet.active{display:flex;}
  .shorts-comments-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .shorts-comments-header h3{font-family:'Space Grotesk';font-size:15px;font-weight:700;margin:0;}
  .shorts-comments-header button{background:var(--glass);border:none;border-radius:50%;width:30px;height:30px;color:var(--text);display:flex;align-items:center;justify-content:center;}
  .shorts-comments-header button svg{width:16px;height:16px;}
  .shorts-comments-list{overflow-y:auto;padding:16px;flex:1;-webkit-overflow-scrolling:touch;}
  .shorts-comments-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:255;display:none;}
  .shorts-comments-backdrop.active{display:block;}
  .shorts-progress .seg{flex:1;height:2.5px;border-radius:2px;background:rgba(255,255,255,0.3);overflow:hidden;}
  .shorts-progress .seg.done{background:rgba(255,255,255,0.9);}

  /* ---------- Media Editor ---------- */
  #editor-screen{position:fixed;inset:0;background:#000;z-index:250;display:none;flex-direction:column;overflow:hidden;}
  #editor-screen.active{display:flex;}
  .editor-topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 12px) 16px 12px;z-index:5;flex-shrink:0;}
  .editor-topbar button{background:rgba(255,255,255,0.12);border:none;border-radius:12px;padding:9px 16px;color:#fff;font-weight:600;font-size:13.5px;}
  .editor-preview-wrap{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;}
  .editor-preview-wrap img,.editor-preview-wrap video{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;pointer-events:none;}
  #editor-text-layer{position:absolute;inset:0;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  .editor-textbox{position:absolute;transform:translate(-50%,-50%);padding:4px 10px;font-weight:700;
    font-size:clamp(14px,4.5vw,26px);line-height:1.25;text-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:move;
    white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;max-width:82%;text-align:center;
    touch-action:none;outline:none;border:1.5px dashed transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  .editor-textbox.editing{border-color:rgba(255,255,255,0.6);}
  .editor-textbox .del-x{position:absolute;top:-14px;right:-14px;width:22px;height:22px;border-radius:50%;background:var(--danger);
    color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;border:2px solid #000;}
  .editor-filter-rail{display:flex;gap:12px;overflow-x:auto;padding:14px 16px;background:rgba(0,0,0,0.6);flex-shrink:0;}
  .editor-filter-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .editor-filter-swatch{width:52px;height:52px;border-radius:14px;background-size:cover;background-position:center;border:2px solid transparent;}
  .editor-filter-chip.selected .editor-filter-swatch{border-color:var(--ember);}
  .editor-filter-chip span{font-size:10.5px;color:#ddd;font-weight:600;}
  .editor-color-row{display:flex;gap:10px;padding:0 16px 14px;background:rgba(0,0,0,0.6);flex-shrink:0;}
  .editor-color-swatch{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);flex-shrink:0;}
  .editor-color-swatch.selected{border-color:#fff;}
  .list-channel-name{font-weight:600;font-size:14.5px;}
  .list-channel-handle{font-size:12px;color:var(--text-muted);}
</style>
</head>
<body>

<div id="auth-screen" class="auth-wrap hidden">
  <div class="auth-hero">
    <div class="logo"><span class="rec-dot"></span>Meta</div>
    <p>Il tuo spazio per pubblicare e guardare video.</p>
  </div>
  <div class="auth-toggle">
    <button id="tab-login" class="active">Accedi</button>
    <button id="tab-signup">Registrati</button>
  </div>

    <label>Nome utente</label>
    <input type="text" id="auth-username" placeholder="es. marco_92" autocapitalize="none">
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="auth-email" placeholder="tu@esempio.com" autocapitalize="none">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="auth-password" placeholder="••••••••">
  </div>
  <button class="btn btn-primary" id="auth-submit">Accedi</button>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div id="topbar-left" class="back-row">
      <div class="logo"><span class="rec-dot"></span>Meta</div>
    </div>
    <div id="topbar-right" style="display:flex;align-items:center;gap:8px;">
      <button class="icon-btn" id="notif-bell" style="position:relative;">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span id="notif-badge" style="display:none;position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;background:var(--ember);border:1.5px solid var(--bg);"></span>
      </button>
      <button class="icon-btn" id="profile-shortcut">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 12c2.5 0 4.5-2 4.5-4.5S14.5 3 12 3 7.5 5 7.5 7.5 9.5 12 12 12Zm0 2c-3.3 0-9 1.7-9 5v2h18v-2c0-3.3-5.7-5-9-5Z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <div id="view-home" class="screen"></div>
  <div id="view-search" class="screen hidden"></div>
  <div id="view-upload" class="screen hidden"></div>
  <div id="view-subs" class="screen hidden"></div>
  <div id="view-shorts" class="screen hidden"></div>
  <div id="view-notifications" class="screen hidden"></div>
  <div id="view-profile" class="screen hidden"></div>
  <div id="view-settings" class="screen hidden"></div>
  <div id="view-channel" class="screen hidden"></div>
  <div id="view-video" class="screen hidden"></div>

  <div class="bottomnav">
    <button class="navbtn active" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H10v6H4a1 1 0 0 1-1-1v-8.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </button>
    <button class="navbtn" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Cerca</span>
    </button>
    <button class="fab" id="nav-upload">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
    <button class="navbtn" data-nav="shorts">
      <svg viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7Z" fill="currentColor"/></svg>
      <span>Shorts</span>
    </button>
    <button class="navbtn" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 12c2.5 0 4.5-2 4.5-4.5S14.5 3 12 3 7.5 5 7.5 7.5 9.5 12 12 12Zm0 2c-3.3 0-9 1.7-9 5v2h18v-2c0-3.3-5.7-5-9-5Z" fill="currentColor"/></svg>
      <span>Profilo</span>
    </button>
  </div>
</div>

<div id="shorts-viewer"></div>
<div id="editor-screen"></div>
<div id="shorts-comments-backdrop" class="shorts-comments-backdrop"></div>
<div id="shorts-comments-sheet" class="shorts-comments-sheet"></div>

<script>
(function(){
  "use strict";

  var SUPABASE_URL = "https://hukapntuhhwpruzgdbma.supabase.co";
  var SUPABASE_KEY = "sb_publishable_7s7M9t7oXQ4uuKO6P2bSTw_HkvE92h9";
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var state = {
    session: null,
    profile: null,
    myChannels: [],
    mySubscriptions: [],
    currentView: "home",
    history: [],
    channelColors: ["#7c5cff","#3d8bff","#2ecc71","#ffb020","#ff4d94","#22c3d6"],
    shortsList: [],
    currentShortIndex: 0
  };

  function el(id){ return document.getElementById(id); }
  function esc(s){
    if(s === null || s === undefined) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }
  function initials(name){
    if(!name) return "?";
    var parts = name.trim().split(" ");
    if(parts.length === 1) return parts[0].substring(0,2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }
  function timeAgo(dateStr){
    var d = new Date(dateStr);
    var diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if(diff < 60) return "adesso";
    if(diff < 3600) return Math.floor(diff/60) + " min fa";
    if(diff < 86400) return Math.floor(diff/3600) + " h fa";
    if(diff < 2592000) return Math.floor(diff/86400) + " g fa";
    if(diff < 31536000) return Math.floor(diff/2592000) + " mesi fa";
    return Math.floor(diff/31536000) + " anni fa";
  }
  function fmtViews(n){
    n = n || 0;
    if(n < 1000) return n + " visualizzazioni";
    if(n < 1000000) return (n/1000).toFixed(n % 1000 >= 100 ? 1 : 0) + "k visualizzazioni";
    return (n/1000000).toFixed(1) + "M visualizzazioni";
  }
  function fmtDuration(sec){
    sec = Math.floor(sec || 0);
    var m = Math.floor(sec/60), s = sec % 60;
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  /* ---------------- Navigation ---------------- */
  var VIEWS = ["home","search","upload","subs","shorts","profile","settings","channel","video","notifications"];
  function showView(name, pushHistory){
    if(pushHistory !== false && state.currentView !== name){
      state.history.push(state.currentView);
    }
    state.currentView = name;
    for(var i=0;i<VIEWS.length;i++){
      var v = el("view-" + VIEWS[i]);
      if(v) v.classList.toggle("hidden", VIEWS[i] !== name);
    }
    var navBtns = document.querySelectorAll(".navbtn");
    for(var j=0;j<navBtns.length;j++){
      navBtns[j].classList.toggle("active", navBtns[j].getAttribute("data-nav") === name);
    }
    updateTopbar(name);
    window.scrollTo(0,0);
  }
  function goBack(){
    var prev = state.history.pop();
    showView(prev || "home", false);
    if(prev === "home") renderHome();
    if(prev === "profile") renderProfile();
  }
  function updateTopbar(name){
    var left = el("topbar-left");
    if(name === "video" || name === "channel" || name === "settings" || name === "subs" || name === "notifications"){
      left.innerHTML = '<button class="icon-btn" id="btn-back"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
      el("btn-back").addEventListener("click", goBack);
    } else {
      left.innerHTML = '<div class="logo"><span class="rec-dot"></span>Meta</div>';
    }
  }

  document.querySelectorAll(".navbtn").forEach(function(btn){
    btn.addEventListener("click", function(){
      var target = btn.getAttribute("data-nav");
      state.history = [];
      showView(target, false);
      if(target === "home") renderHome();
      if(target === "search") renderSearch();
      if(target === "subs") renderSubs();
      if(target === "shorts") renderShortsTab();
      if(target === "profile") renderProfile();
    });
  });
  el("nav-upload").addEventListener("click", function(){
    if(!state.session){ showAuthRequired(); return; }
    state.history = [];
    showView("upload", false);
    renderUpload();
  });
  el("profile-shortcut").addEventListener("click", function(){
    state.history = [];
    showView("profile", false);
    renderProfile();
  });
  el("notif-bell").addEventListener("click", function(){
    if(!state.session){ showAuthRequired(); return; }
    state.history = [];
    showView("notifications", false);
    renderNotifications();
  });

  function showAuthRequired(){
    alert("Accedi o registrati per continuare.");
    document.getElementById("auth-screen").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }

  /* ---------------- Auth ---------------- */
  var authMode = "login";
  el("tab-login").addEventListener("click", function(){
    authMode = "login";
    el("tab-login").classList.add("active");
    el("tab-signup").classList.remove("active");
    el("signup-username-field").classList.add("hidden");
    el("auth-submit").textContent = "Accedi";
  });
  el("tab-signup").addEventListener("click", function(){
    authMode = "signup";
    el("tab-signup").classList.add("active");
    el("tab-login").classList.remove("active");
    el("signup-username-field").classList.remove("hidden");
    el("auth-submit").textContent = "Crea account";
  });

  el("auth-submit").addEventListener("click", function(){
    var email = el("auth-email").value.trim();
    var password = el("auth-password").value;
    var errBox = el("auth-error");
    errBox.classList.add("hidden");
    if(!email || !password){
      errBox.textContent = "Inserisci email e password.";
      errBox.classList.remove("hidden");
      return;
    }
    el("auth-submit").textContent = "Attendere...";
    el("auth-submit").disabled = true;

    if(authMode === "signup"){
      var username = el("auth-username").value.trim();
      if(!username){
        errBox.textContent = "Scegli un nome utente.";
        errBox.classList.remove("hidden");
        el("auth-submit").disabled = false;
        el("auth-submit").textContent = "Crea account";
        return;
      }
      sb.auth.signUp({
        email: email,
        password: password,
        options: { data: { username: username } }
      }).then(function(res){
        el("auth-submit").disabled = false;
        el("auth-submit").textContent = "Crea account";
        if(res.error){
          errBox.textContent = res.error.message;
          errBox.classList.remove("hidden");
          return;
        }
        if(res.data.session){
          state.isNewSignup = true;
          onAuthReady(res.data.session);
        } else {
          errBox.textContent = "Controlla la tua email per confermare l'account.";
          errBox.classList.remove("hidden");
        }
      });
    } else {
      sb.auth.signInWithPassword({ email: email, password: password }).then(function(res){
        el("auth-submit").disabled = false;
        el("auth-submit").textContent = "Accedi";
        if(res.error){
          errBox.textContent = res.error.message;
          errBox.classList.remove("hidden");
          return;
        }
        onAuthReady(res.data.session);
      });
    }
  });

  function onAuthReady(session){
    state.session = session;
    loadProfileAndEnter();
  }

  function loadProfileAndEnter(){
    if(!state.session){
      el("auth-screen").classList.remove("hidden");
      el("app").classList.add("hidden");
      renderHome();
      return;
    }
    sb.from("profiles").select("*").eq("id", state.session.user.id).single().then(function(res){
      state.profile = res.data;
      el("auth-screen").classList.add("hidden");
      el("app").classList.remove("hidden");
      loadMyChannels();
      loadMySubscriptions();
      refreshNotifBadge();
      subscribeToNotifications();
      showView(state.currentView || "home", false);
      renderHome();
      if(state.isNewSignup){
        state.isNewSignup = false;
        showWelcomeOverlay();
      }
    });
  }

  function showWelcomeOverlay(){
    var overlay = document.createElement("div");
    overlay.id = "welcome-overlay";
    overlay.style.cssText = "position:fixed;inset:0;background:#060a12;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;";
    var uname = state.profile ? state.profile.username : "";
    overlay.innerHTML =
      '<div class="logo" style="font-size:28px;margin-bottom:14px;"><span class="rec-dot"></span>Meta</div>' +
      '<div class="display" style="font-size:20px;font-weight:700;margin-bottom:10px;">Benvenuto' + (uname ? ", " + esc(uname) : "") + '!</div>' +
      '<p style="color:var(--text-muted);font-size:14px;max-width:300px;line-height:1.5;margin-bottom:8px;">Ecco come iniziare:</p>' +
      '<div style="text-align:left;max-width:300px;margin-bottom:28px;">' +
        '<p style="font-size:13.5px;color:#ddd;margin-bottom:10px;">1. Tocca <b>+</b> per pubblicare un video o una foto</p>' +
        '<p style="font-size:13.5px;color:#ddd;margin-bottom:10px;">2. Crea un canale dal tuo Profilo, oppure pubblica direttamente col tuo nome</p>' +
        '<p style="font-size:13.5px;color:#ddd;">3. Esplora Home e Shorts, iscriviti ai canali che ti piacciono</p>' +
      '</div>' +
      '<button class="btn btn-primary" id="welcome-start-btn" style="max-width:260px;">Inizia</button>';
    document.body.appendChild(overlay);
    el("welcome-start-btn").addEventListener("click", function(){ overlay.remove(); });
  }

  function loadMyChannels(){
    if(!state.session) return;
    sb.from("channels").select("*").eq("owner_id", state.session.user.id).order("created_at").then(function(res){
      state.myChannels = res.data || [];
    });
  }
  function loadMySubscriptions(){
    if(!state.session) return;
    sb.from("subscriptions").select("channel_id").eq("subscriber_id", state.session.user.id).then(function(res){
      state.mySubscriptions = (res.data || []).map(function(r){ return r.channel_id; });
    });
  }

  /* ---------------- Notifications ---------------- */
  function refreshNotifBadge(){
    if(!state.session){ el("notif-badge").style.display = "none"; return; }
    sb.from("notifications").select("id", {count:"exact", head:true})
      .eq("user_id", state.session.user.id).eq("is_read", false).then(function(res){
        el("notif-badge").style.display = (res.count && res.count > 0) ? "block" : "none";
      });
  }

  function subscribeToNotifications(){
    if(!state.session) return;
    sb.channel("notifications-" + state.session.user.id)
      .on("postgres_changes", {
        event: "INSERT", schema: "public", table: "notifications",
        filter: "user_id=eq." + state.session.user.id
      }, function(){
        refreshNotifBadge();
        if(state.currentView === "notifications") renderNotifications();
      })
      .subscribe();
  }

  function subscribeToLiveFeed(){
    sb.channel("videos-live-feed")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "videos" }, function(payload){
        handleNewVideoRealtime(payload.new);
      })
      .subscribe();
  }

  function handleNewVideoRealtime(row){
    sb.from("videos").select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color)")
      .eq("id", row.id).single().then(function(res){
        var v = res.data;
        if(!v) return;
        if(v.is_short){
          if(state.currentView === "home" && el("shorts-section")) loadShortsRail();
          return;
        }
        if(state.currentView === "home"){
          var feedList = el("feed-list");
          if(!feedList) return;
          var emptyMsg = feedList.querySelector(".empty");
          if(emptyMsg) feedList.innerHTML = "";
          var wrapper = document.createElement("div");
          wrapper.innerHTML = renderVideoCard(v);
          var card = wrapper.firstElementChild;
          card.classList.add("live-new");
          feedList.insertBefore(card, feedList.firstChild);
          attachSingleCardListeners(card);
        }
      });
  }

  function notifIcon(type){
    if(type === "new_video") return '<svg viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7Z" fill="currentColor"/></svg>';
    if(type === "new_comment") return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';
    if(type === "new_subscriber") return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
    if(type === "reminder") return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/></svg>';
    return '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/></svg>';
  }

  function renderNotifications(){
    var container = el("view-notifications");
    container.innerHTML = '<h1 class="page-title">Notifiche</h1><div class="progress-ring-wrap"><div class="spinner"></div></div>';
    sb.from("notifications").select("*").eq("user_id", state.session.user.id)
      .order("created_at", {ascending:false}).limit(50).then(function(res){
        var items = res.data || [];
        if(items.length === 0){
          container.innerHTML = '<h1 class="page-title">Notifiche</h1>' + emptyState("Nessuna notifica per ora.");
          return;
        }
        container.innerHTML = '<h1 class="page-title">Notifiche</h1>' +
          items.map(function(n){
            return '<div class="glass notif-item ' + (n.is_read ? "" : "unread") + '" data-id="' + n.id + '" data-video-id="' + (n.video_id||"") + '" data-channel-id="' + (n.channel_id||"") + '">' +
              '<div class="notif-icon">' + notifIcon(n.type) + '</div>' +
              '<div class="notif-text">' + esc(n.message) + '<div class="notif-time">' + timeAgo(n.created_at) + '</div></div>' +
              (n.is_read ? '' : '<div class="notif-dot"></div>') +
            '</div>';
          }).join("");

        container.querySelectorAll(".notif-item").forEach(function(item){
          item.addEventListener("click", function(){
            var id = item.getAttribute("data-id");
            var videoId = item.getAttribute("data-video-id");
            var channelId = item.getAttribute("data-channel-id");
            sb.from("notifications").update({is_read:true}).eq("id", id).then(function(){
              item.classList.remove("unread");
              var dot = item.querySelector(".notif-dot");
              if(dot) dot.remove();
              refreshNotifBadge();
            });
            if(videoId){ openVideo(videoId); }
            else if(channelId){ openChannel(channelId); }
          });
        });

        sb.from("notifications").update({is_read:true}).eq("user_id", state.session.user.id).eq("is_read", false).then(function(){
          refreshNotifBadge();
        });
      });
  }

  /* ---------------- Home / Feed ---------------- */
  function renderHome(){
    var container = el("view-home");
    container.innerHTML = '<h1 class="page-title">Home</h1><div id="shorts-section"></div><div id="trending-section"></div><div id="feed-list"></div><div id="feed-more-spinner"></div>';
    loadShortsRail();
    loadTrendingRail();
    var feedList = el("feed-list");
    feedList.innerHTML = '<div class="progress-ring-wrap"><div class="spinner"></div></div>';
    state.homeFeedOffset = 0;
    state.homeFeedHasMore = true;
    state.homeFeedLoadingMore = false;

    sb.from("videos")
      .select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color)")
      .eq("is_short", false)
      .order("created_at", { ascending: false })
      .range(0, 19)
      .then(function(res){
        if(res.error){
          feedList.innerHTML = emptyState("Errore caricamento: " + res.error.message);
          return;
        }
        if(!res.data || res.data.length === 0){
          feedList.innerHTML = emptyState("Nessun video ancora. Sii il primo a pubblicare!", iconCamera());
          state.homeFeedHasMore = false;
          return;
        }
        feedList.innerHTML = res.data.map(renderVideoCard).join("");
        attachVideoCardListeners(feedList);
        state.homeFeedOffset = res.data.length;
        state.homeFeedHasMore = res.data.length === 20;
      });
  }

  function loadMoreHomeFeed(){
    if(!state.homeFeedHasMore || state.homeFeedLoadingMore) return;
    var feedList = el("feed-list");
    if(!feedList) return;
    state.homeFeedLoadingMore = true;
    var spinner = el("feed-more-spinner");
    if(spinner) spinner.innerHTML = '<div class="progress-ring-wrap" style="padding:20px 0;"><div class="spinner"></div></div>';
    sb.from("videos")
      .select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color)")
      .eq("is_short", false)
      .order("created_at", { ascending: false })
      .range(state.homeFeedOffset, state.homeFeedOffset + 19)
      .then(function(res){
        state.homeFeedLoadingMore = false;
        if(spinner) spinner.innerHTML = "";
        var newVideos = res.data || [];
        if(newVideos.length === 0){ state.homeFeedHasMore = false; return; }
        newVideos.forEach(function(v){
          var wrapper = document.createElement("div");
          wrapper.innerHTML = renderVideoCard(v);
          var card = wrapper.firstElementChild;
          feedList.appendChild(card);
          attachSingleCardListeners(card);
        });
        state.homeFeedOffset += newVideos.length;
        state.homeFeedHasMore = newVideos.length === 20;
      });
  }

  function loadTrendingRail(){
    var box = el("trending-section");
    if(!box) return;
    sb.from("videos")
      .select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color), likes(count)")
      .eq("is_short", false)
      .order("created_at", { ascending: false })
      .limit(30)
      .then(function(res){
        var videos = res.data || [];
        if(videos.length === 0){ box.innerHTML = ""; return; }
        videos.forEach(function(v){ v._likeCount = (v.likes && v.likes[0] && v.likes[0].count) || 0; });
        videos.sort(function(a,b){ return b._likeCount - a._likeCount; });
        var top = videos.filter(function(v){ return v._likeCount > 0; }).slice(0, 8);
        if(top.length === 0){ box.innerHTML = ""; return; }
        box.innerHTML =
          '<div class="shorts-header"><svg viewBox="0 0 24 24" fill="none"><path d="M13 3 4 14h6l-1 7 9-11h-6l1-7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><span>Di tendenza</span></div>' +
          '<div class="trending-rail">' + top.map(renderVideoCard).join("") + '</div>';
        attachVideoCardListeners(box);
      });
  }

  function loadShortsRail(){
    var box = el("shorts-section");
    if(!box) return;
    sb.from("videos")
      .select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color)")
      .eq("is_short", true)
      .order("created_at", { ascending: false })
      .limit(15)
      .then(function(res){
        if(res.error || !res.data || res.data.length === 0){ box.innerHTML = ""; return; }
        var shorts = res.data;
        state.shortsList = shorts;
        box.innerHTML =
          '<div class="shorts-header"><svg viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7Z" fill="currentColor"/></svg><span>Shorts</span></div>' +
          '<div class="shorts-rail">' + shorts.map(function(s, i){
            var thumb = s.thumbnail_url ? '<img src="' + esc(s.thumbnail_url) + '" loading="lazy">' : '<div class="thumb-placeholder">' + iconCamera() + '</div>';
            return '<div class="short-card" data-index="' + i + '">' + thumb +
              '<svg class="short-play" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7Z" fill="white"/></svg>' +
              '<div class="short-title">' + esc(s.title) + '</div></div>';
          }).join("") + '</div>';
        box.querySelectorAll(".short-card").forEach(function(card){
          card.addEventListener("click", function(){
            openShortsViewer(parseInt(card.getAttribute("data-index"), 10));
          });
        });
      });
  }

  function openShortsViewer(index){
    state.currentShortIndex = index;
    var viewer = el("shorts-viewer");
    viewer.classList.add("active");
    viewer.innerHTML = '<div class="shorts-progress" id="shorts-progress"></div>' +
      '<button class="shorts-close" id="shorts-close"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>' +
      '<div id="shorts-slide-container" style="width:100%;height:100%;"></div>';

    var progressBox = el("shorts-progress");
    progressBox.innerHTML = state.shortsList.map(function(_, i){
      return '<div class="seg' + (i <= index ? " done" : "") + '" data-i="' + i + '"></div>';
    }).join("");

    el("shorts-close").addEventListener("click", closeShortsViewer);
    renderShortSlide(index);

    var startY = null;
    viewer.ontouchstart = function(e){ startY = e.touches[0].clientY; };
    viewer.ontouchend = function(e){
      if(startY === null) return;
      var endY = e.changedTouches[0].clientY;
      var delta = startY - endY;
      if(Math.abs(delta) > 60){
        if(delta > 0) goToShort(state.currentShortIndex + 1);
        else goToShort(state.currentShortIndex - 1);
      }
      startY = null;
    };
  }

  function goToShort(index){
    if(index < 0 || index >= state.shortsList.length){
      if(index >= state.shortsList.length) closeShortsViewer();
      return;
    }
    state.currentShortIndex = index;
    renderShortSlide(index);
    var segs = document.querySelectorAll("#shorts-progress .seg");
    segs.forEach(function(seg, i){ seg.classList.toggle("done", i <= index); });
  }

  function renderShortSlide(index){
    if(state.shortPhotoTimer){ clearTimeout(state.shortPhotoTimer); state.shortPhotoTimer = null; }
    var s = state.shortsList[index];
    var author = authorOf(s);
    var isPhoto = s.media_type === "photo";
    var isSubscribed = author.kind === "channel" && state.mySubscriptions.indexOf(author.id) !== -1;
    var container = el("shorts-slide-container");
    var filterCss = filterCssById(s.filter_name);
    var mediaTag = isPhoto
      ? '<img id="short-video" src="' + esc(s.video_url) + '" style="width:100%;height:100%;object-fit:contain;background:#000;filter:' + filterCss + ';">'
      : '<video id="short-video" src="' + esc(s.video_url) + '" poster="' + esc(s.thumbnail_url || "") + '" playsinline autoplay loop muted style="filter:' + filterCss + ';"></video>';
    container.innerHTML =
      '<div class="shorts-slide">' +
        mediaTag +
        renderOverlaysHtml(s.text_overlays) +
        '<div class="shorts-tap-zone" id="shorts-tap"></div>' +

      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;

            videoEl.muted = false;

  function loadShortsComments(videoId){
    var box = el("shorts-comments-list");
    if(!box) return;
    sb.from("comments").select("*, profiles(username, avatar_color)").eq("video_id", videoId)
      .order("created_at",{ascending:false}).then(function(res){
        var comments = res.data || [];
        if(!el("shorts-comments-list")) return;
        if(comments.length === 0){
          box.innerHTML = '<p style="font-size:13px;color:var(--text-faint);">Nessun commento ancora.</p>';
          return;
        }
        box.innerHTML = comments.map(function(c){
          var p = c.profiles || {};
          var isOwn = state.session && state.session.user.id === c.user_id;
          return '<div class="comment">' +
            '<div class="avatar" style="background:' + (p.avatar_color || "#7c5cff") + '">' + avatarInner(p.username, p.avatar_url) + '</div>' +
            '<div class="comment-body"><div class="comment-author">' + esc(p.username) + '<span class="comment-time">' + timeAgo(c.created_at) + '</span></div>' +
            '<div class="comment-text" id="scomment-text-' + c.id + '">' + esc(c.content) + '</div>' +
            (isOwn ? '<div style="margin-top:4px;display:flex;gap:12px;"><button class="scomment-action-btn" data-action="edit" data-id="' + c.id + '" style="background:none;border:none;color:var(--text-faint);font-size:11.5px;padding:0;">Modifica</button><button class="scomment-action-btn" data-action="delete" data-id="' + c.id + '" style="background:none;border:none;color:var(--danger);font-size:11.5px;padding:0;">Elimina</button></div>' : '') +
            '</div>' +
          '</div>';
        }).join("");
        box.querySelectorAll(".scomment-action-btn").forEach(function(btn){
          btn.addEventListener("click", function(){
            var id = btn.getAttribute("data-id");
            if(btn.getAttribute("data-action") === "delete"){
              if(!confirm("Eliminare questo commento?")) return;
              sb.from("comments").delete().eq("id", id).then(function(){ loadShortsComments(videoId); });
            } else {
              var current = el("scomment-text-" + id) ? el("scomment-text-" + id).textContent : "";
              var newText = prompt("Modifica il commento:", current);
              if(newText === null) return;
              newText = newText.trim();
              if(!newText) return;
              sb.from("comments").update({ content: newText }).eq("id", id).then(function(){ loadShortsComments(videoId); });
            }
          });
        });
      });
  }

  function submitShortsComment(videoId, input){
    var text = input.value.trim();

    sb.from("comments").insert({video_id: videoId, user_id: state.session.user.id, content: text}).then(function(res){

      loadShortsComments(videoId);
      var countEl = el("short-comment-count");
      if(countEl) countEl.textContent = parseInt(countEl.textContent,10) + 1;
    });
  }

    }

  var _feedPreviewObserver = null;
  function getFeedPreviewObserver(){
    if(_feedPreviewObserver) return _feedPreviewObserver;
    _feedPreviewObserver = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        var wrap = entry.target;
        if(entry.isIntersecting && entry.intersectionRatio >= 0.6){
          if(wrap.querySelector(".feed-preview-video")) return;
          var src = wrap.getAttribute("data-video-src");
          if(!src) return;
          var vid = document.createElement("video");
          vid.className = "feed-preview-video";
          vid.src = src;
          vid.muted = true;
          vid.loop = true;
          vid.playsInline = true;
          vid.preload = "metadata";
          wrap.appendChild(vid);
          var playPromise = vid.play();
          if(playPromise && playPromise.catch) playPromise.catch(function(){});
        } else {
          var existing = wrap.querySelector(".feed-preview-video");
          if(existing){
            try{ existing.pause(); }catch(e){}
            existing.remove();
          }
        }
      });
    }, { threshold: [0, 0.6] });
    return _feedPreviewObserver;
  }

  function deleteVideoFlow(videoId, cardEl, onDone){
    var confirmed = confirm("Eliminare definitivamente questo video? L'azione non puo essere annullata.");
    if(!confirmed) return;
    sb.from("videos").select("video_url, thumbnail_url").eq("id", videoId).single().then(function(vres){
      var v = vres.data;
      var tasks = [];
      if(v){
        var vp = storagePathFromUrl(v.video_url, "videos");
        var tp = storagePathFromUrl(v.thumbnail_url, "thumbnails");
        if(vp) tasks.push(sb.storage.from("videos").remove([vp]));
        if(tp) tasks.push(sb.storage.from("thumbnails").remove([tp]));
      }
      Promise.all(tasks).then(function(){
        sb.from("videos").delete().eq("id", videoId).then(function(res){
          if(res.error){ alert("Errore: " + res.error.message); return; }
          if(cardEl) cardEl.remove();
          if(onDone) onDone();
        });
      });
    });
  }

      sb.from("videos").select("*, channels(name, handle, avatar_color, owner_id), profiles(username, avatar_color)")

    ]).then(function(results){

  /* ---------------- Push notifications ---------------- */
  var VAPID_PUBLIC_KEY = "BCrYxUHveMTMxHwU44oWuA-q3j8gWDkPZZVvcbaDIIZyPcMcahFbuiYTI1Szvex4natYE1i2cvOToR1TzYua108";

  function urlBase64ToUint8Array(base64String){
    var padding = "=".repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    var rawData = atob(base64);
    var outputArray = new Uint8Array(rawData.length);
    for(var i = 0; i < rawData.length; i++){ outputArray[i] = rawData.charCodeAt(i); }
    return outputArray;
  }

  function isStandalone(){
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  }

  function renderPushSettings(){
    var label = el("push-status-label");
    var knob = el("push-toggle-knob");
    var toggle = el("push-toggle-switch");
    if(!("serviceWorker" in navigator) || !("PushManager" in window)){
      label.textContent = "Non supportato su questo browser";
      toggle.style.opacity = "0.4";
      return;
    }
    if(!isStandalone()){
      label.textContent = "Aggiungi l'app alla schermata Home per attivarle";
      toggle.style.opacity = "0.4";
      return;
    }

    navigator.serviceWorker.getRegistration().then(function(reg){
      if(!reg){ setPushUI(false); return; }
      reg.pushManager.getSubscription().then(function(sub){
        setPushUI(!!sub);
      });
    });

    function setPushUI(active){
      knob.style.transform = active ? "translateX(18px)" : "translateX(0)";
      knob.style.background = active ? "var(--ember)" : "var(--text-faint)";
      label.textContent = active ? "Attive su questo dispositivo" : "Anche a schermo bloccato";
    }

    toggle.onclick = function(){
      navigator.serviceWorker.getRegistration().then(function(reg){
        if(!reg){ alert("Servizio non ancora pronto, riprova tra un istante."); return; }
        reg.pushManager.getSubscription().then(function(existing){
          if(existing){
            existing.unsubscribe().then(function(){
              sb.from("push_subscriptions").delete().eq("endpoint", existing.endpoint).then(function(){
                setPushUI(false);
              });
            });
          } else {
            Notification.requestPermission().then(function(perm){
              if(perm !== "granted"){ alert("Permesso negato per le notifiche."); return; }
              reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
              }).then(function(sub){
                var raw = sub.toJSON();
                sb.from("push_subscriptions").insert({
                  user_id: state.session.user.id,
                  endpoint: raw.endpoint,
                  p256dh: raw.keys.p256dh,
                  auth: raw.keys.auth
                }).then(function(res){
                  if(res.error && res.error.message.indexOf("duplicate") === -1){
                    alert("Errore: " + res.error.message);
                    return;
                  }
                  setPushUI(true);
                });
              }).catch(function(err){
                alert("Impossibile attivare le notifiche: " + err.message);
              });
            });
          }
        });
      });
    };
  }

  var USAGE_OPTIONS = [15, 30, 60, 90, 120];

  function todayKey(){
    var d = new Date();
    return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }
  function getUsageSeconds(){
    return parseInt(localStorage.getItem("meta_usage_" + todayKey()) || "0", 10);
  }
  function setUsageSeconds(sec){
    localStorage.setItem("meta_usage_" + todayKey(), String(sec));
  }
  function getDailyLimitMinutes(){
    var v = localStorage.getItem("meta_daily_limit_minutes");
    return v ? parseInt(v, 10) : null;

  function setDailyLimitMinutes(min){
    if(min === null){ localStorage.removeItem("meta_daily_limit_minutes"); }
    else { localStorage.setItem("meta_daily_limit_minutes", String(min)); }
  }
  function isUnlockedToday(){
    return localStorage.getItem("meta_unlocked_" + todayKey()) === "true";
  }
  function unlockForToday(){
    localStorage.setItem("meta_unlocked_" + todayKey(), "true");
  }

  function renderUsageSettings(){
    var limit = getDailyLimitMinutes();
    var enabled = limit !== null;
    var knob = el("usage-toggle-knob");
    knob.style.transform = enabled ? "translateX(18px)" : "translateX(0)";
    knob.style.background = enabled ? "var(--ember)" : "var(--text-faint)";

    var optsBox = el("usage-limit-options");
    optsBox.style.display = enabled ? "flex" : "none";
    optsBox.innerHTML = USAGE_OPTIONS.map(function(m){
      return '<div class="channel-chip ' + (limit === m ? "selected" : "") + '" data-min="' + m + '">' + m + ' min</div>';
    }).join("");
    optsBox.querySelectorAll(".channel-chip").forEach(function(chip){
      chip.addEventListener("click", function(){
        var m = parseInt(chip.getAttribute("data-min"), 10);
        setDailyLimitMinutes(m);
        optsBox.querySelectorAll(".channel-chip").forEach(function(x){ x.classList.remove("selected"); });
        chip.classList.add("selected");
        checkUsageLock();
      });
    });

    el("usage-today-label").textContent = Math.floor(getUsageSeconds() / 60) + " min";

    el("usage-toggle-switch").onclick = function(){
      var nowEnabled = getDailyLimitMinutes() !== null;
      if(nowEnabled){
        setDailyLimitMinutes(null);
      } else {
        setDailyLimitMinutes(USAGE_OPTIONS[1]);
      }
      renderUsageSettings();
    };
  }

  function checkUsageLock(){
    var limit = getDailyLimitMinutes();
    if(limit === null) return;
    if(isUnlockedToday()) return;
    var seconds = getUsageSeconds();
    if(seconds >= limit * 60){
      showUsageLockScreen();
    }
  }

  function showUsageLockScreen(){
    if(el("usage-lock-overlay")) return;
    var overlay = document.createElement("div");
    overlay.id = "usage-lock-overlay";
    overlay.style.cssText = "position:fixed;inset:0;background:#060a12;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;";
    overlay.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" style="width:46px;height:46px;color:var(--ember);margin-bottom:20px;"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>' +
      '<div class="display" style="font-size:20px;font-weight:700;margin-bottom:8px;">Tempo scaduto per oggi</div>' +
      '<p style="color:var(--text-muted);font-size:14px;max-width:280px;margin-bottom:26px;">Hai raggiunto il limite di utilizzo giornaliero che hai impostato.</p>' +
      '<button class="btn btn-primary" id="usage-continue-btn" style="max-width:260px;">Continua a usare</button>';
    document.body.appendChild(overlay);
    el("usage-continue-btn").addEventListener("click", function(){
      unlockForToday();
      overlay.remove();
    });
  }

  function startUsageTracking(){
    setInterval(function(){
      if(document.visibilityState !== "visible") return;
      if(el("usage-lock-overlay")) return;
      var seconds = getUsageSeconds() + 1;
      setUsageSeconds(seconds);
      var label = el("usage-today-label");
      if(label) label.textContent = Math.floor(seconds / 60) + " min";
      checkUsageLock();
    }, 1000);
  }

  function deleteChannelFlow(channel){
    var confirmed = confirm(
      "Eliminare definitivamente il canale \"" + channel.name + "\"?\n\n" +
      "Verranno eliminati tutti i suoi video, i commenti, i like e disiscritti tutti gli iscritti. Questa azione non puo essere annullata."
    );
    if(!confirmed) return;

    var container = el("view-channel");
    container.innerHTML = '<div class="progress-ring-wrap"><div class="spinner"></div><p style="color:var(--text-muted);font-size:13.5px;">Eliminazione in corso...</p></div>';

    sb.from("videos").select("video_url, thumbnail_url").eq("channel_id", channel.id).then(function(vres){
      var videos = vres.data || [];
      var videoPaths = [];
      var thumbPaths = [];
      videos.forEach(function(v){
        var vp = storagePathFromUrl(v.video_url, "videos");
        if(vp) videoPaths.push(vp);
        var tp = storagePathFromUrl(v.thumbnail_url, "thumbnails");
        if(tp) thumbPaths.push(tp);
      });

      var cleanupTasks = [];
      if(videoPaths.length) cleanupTasks.push(sb.storage.from("videos").remove(videoPaths));
      if(thumbPaths.length) cleanupTasks.push(sb.storage.from("thumbnails").remove(thumbPaths));

      Promise.all(cleanupTasks).then(function(){
        sb.from("channels").delete().eq("id", channel.id).then(function(res){
          if(res.error){
            container.innerHTML = emptyState("Errore durante l'eliminazione: " + res.error.message);
            return;
          }
          state.myChannels = state.myChannels.filter(function(c){ return c.id !== channel.id; });
          state.mySubscriptions = state.mySubscriptions.filter(function(id){ return id !== channel.id; });
          state.history = [];
          showView("profile", false);
          renderProfile();
        });
      });
    });
  }

  function storagePathFromUrl(url, bucket){
    if(!url) return null;
    var marker = "/storage/v1/object/public/" + bucket + "/";
    var idx = url.indexOf(marker);
    if(idx === -1) return null;
    return url.substring(idx + marker.length);
  }

  function toggleSubscription(channelId, btn){
    var isSubscribed = state.mySubscriptions.indexOf(channelId) !== -1;
    if(isSubscribed){
      sb.from("subscriptions").delete().eq("subscriber_id", state.session.user.id).eq("channel_id", channelId).then(function(){
        state.mySubscriptions = state.mySubscriptions.filter(function(id){ return id !== channelId; });
        btn.textContent = "Iscriviti";
        btn.className = "btn btn-violet btn-sm";
      });
    } else {
      sb.from("subscriptions").insert({subscriber_id: state.session.user.id, channel_id: channelId}).then(function(){
        state.mySubscriptions.push(channelId);
        btn.textContent = "Iscritto";
        btn.className = "btn btn-ghost btn-sm";
      });
    }
  }

        el("comment-submit").addEventListener("click", function(){ submitComment(v.id, input); });
        input.addEventListener("keydown", function(e){ if(e.key === "Enter") submitComment(v.id, input); });

  function loadLikes(videoId){
    sb.from("likes").select("id", {count:"exact", head:true}).eq("video_id", videoId).then(function(res){
      el("like-count").textContent = res.count || 0;
    });
    if(!state.session) return;
    sb.from("likes").select("id").eq("video_id", videoId).eq("user_id", state.session.user.id).maybeSingle().then(function(res){
      var btn = el("like-btn");
      if(res.data){
        btn.classList.add("liked");
        btn.setAttribute("data-liked", "true");
      }
      btn.addEventListener("click", function(){
        toggleLike(videoId, btn);
      });
    });
  }
  function toggleLike(videoId, btn){
    if(!state.session){ showAuthRequired(); return; }
    var liked = btn.getAttribute("data-liked") === "true";
    var countEl = el("like-count");
    if(liked){
      sb.from("likes").delete().eq("video_id", videoId).eq("user_id", state.session.user.id).then(function(){
        btn.classList.remove("liked");
        btn.setAttribute("data-liked","false");
        countEl.textContent = Math.max(0, parseInt(countEl.textContent,10) - 1);
      });
    } else {
      sb.from("likes").insert({video_id: videoId, user_id: state.session.user.id}).then(function(){
        btn.classList.add("liked");
        btn.setAttribute("data-liked","true");
        countEl.textContent = parseInt(countEl.textContent,10) + 1;
      });
    }
  }

  function loadComments(videoId){
    var box = el("comments-list");
    sb.from("comments").select("*, profiles(username, avatar_color)").eq("video_id", videoId)
      .order("created_at",{ascending:false}).then(function(res){
        var comments = res.data || [];
        if(comments.length === 0){
          box.innerHTML = '<p style="font-size:13px;color:var(--text-faint);">Nessun commento ancora.</p>';
          return;
        }
        box.innerHTML = comments.map(function(c){
          var p = c.profiles || {};
          var isOwn = state.session && state.session.user.id === c.user_id;
          return '<div class="comment">' +
            '<div class="avatar" style="background:' + (p.avatar_color || "#7c5cff") + '">' + avatarInner(p.username, p.avatar_url) + '</div>' +
            '<div class="comment-body"><div class="comment-author">' + esc(p.username) + '<span class="comment-time">' + timeAgo(c.created_at) + '</span></div>' +
            '<div class="comment-text" id="comment-text-' + c.id + '">' + esc(c.content) + '</div>' +
            (isOwn ? '<div style="margin-top:4px;display:flex;gap:12px;"><button class="comment-action-btn" data-action="edit" data-id="' + c.id + '" data-video="' + videoId + '" style="background:none;border:none;color:var(--text-faint);font-size:11.5px;padding:0;">Modifica</button><button class="comment-action-btn" data-action="delete" data-id="' + c.id + '" data-video="' + videoId + '" style="background:none;border:none;color:var(--danger);font-size:11.5px;padding:0;">Elimina</button></div>' : '') +
            '</div>' +
          '</div>';
        }).join("");
        box.querySelectorAll(".comment-action-btn").forEach(function(btn){
          btn.addEventListener("click", function(){
            var id = btn.getAttribute("data-id");
            var vid = btn.getAttribute("data-video");
            if(btn.getAttribute("data-action") === "delete") deleteCommentFlow(id, vid, loadComments);
            else editCommentFlow(id, vid, loadComments);
          });
        });
      });
  }
  function editCommentFlow(commentId, videoId, reloadFn){
    var currentText = el("comment-text-" + commentId) ? el("comment-text-" + commentId).textContent : "";
    var newText = prompt("Modifica il commento:", currentText);
    if(newText === null) return;
    newText = newText.trim();
    if(!newText) return;
    sb.from("comments").update({ content: newText }).eq("id", commentId).then(function(res){
      if(res.error){ alert("Errore: " + res.error.message); return; }
      reloadFn(videoId);
    });
  }
  function deleteCommentFlow(commentId, videoId, reloadFn){
    if(!confirm("Eliminare questo commento?")) return;
    sb.from("comments").delete().eq("id", commentId).then(function(res){
      if(res.error){ alert("Errore: " + res.error.message); return; }
      reloadFn(videoId);
    });
  }
  function submitComment(videoId, input){
    var text = input.value.trim();
    if(!text) return;
    input.value = "";
    sb.from("comments").insert({video_id: videoId, user_id: state.session.user.id, content: text}).then(function(res){
      if(res.error){ alert("Errore: " + res.error.message); return; }
      loadComments(videoId);
    });
  }

  /* ---------------- Media Editor (filters + text) ---------------- */
  var FILTERS = [
    { id: "none", label: "Normale", css: "" },
    { id: "bn", label: "B&N", css: "grayscale(1)" },
    { id: "vivido", label: "Vivido", css: "saturate(1.6) contrast(1.12)" },
    { id: "vintage", label: "Vintage", css: "sepia(0.35) contrast(0.9) brightness(1.05) saturate(0.85)" },
    { id: "freddo", label: "Freddo", css: "hue-rotate(-8deg) saturate(1.1) brightness(1.03) contrast(1.05)" },
    { id: "caldo", label: "Caldo", css: "sepia(0.22) saturate(1.3) hue-rotate(-6deg)" },
    { id: "seppia", label: "Seppia", css: "sepia(0.8)" },
    { id: "contrasto", label: "Contrasto", css: "contrast(1.4) saturate(1.2)" }
  ];
  var TEXT_COLORS = ["#ffffff", "#3d8bff", "#ff5a36", "#ffd23d", "#2ecc71", "#000000"];

  function filterCssById(id){
    for(var i=0;i<FILTERS.length;i++){ if(FILTERS[i].id === id) return FILTERS[i].css; }
    return "";
  }
  function renderOverlaysHtml(overlays){
    if(!overlays || !overlays.length) return "";
    return overlays.map(function(o){
      return '<div class="media-text-overlay" style="left:' + o.x + '%;top:' + o.y + '%;color:' + esc(o.color) + ';">' + esc(o.text) + '</div>';
    }).join("");
  }

  function authorOf(v){
    if(v.channel_id && v.channels){
      return { kind: "channel", id: v.channel_id, name: v.channels.name, color: v.channels.avatar_color || "#7c5cff", avatarUrl: null };
    }
    if(v.owner_id && v.profiles){
      return { kind: "profile", id: v.owner_id, name: v.profiles.username, color: v.profiles.avatar_color || "#7c5cff", avatarUrl: v.profiles.avatar_url || null };
    }

  function avatarInner(name, avatarUrl){

  function openGroupEditor(){
    var screen = el("editor-screen");
    var group = uploadState.photoGroup;
    var idx = 0;
    var currentUrl = null;

    function render(){
      if(currentUrl) URL.revokeObjectURL(currentUrl);
      var item = group[idx];
      currentUrl = URL.createObjectURL(item.file);
      var url = currentUrl;

      screen.innerHTML =
        '<div class="editor-topbar"><button id="editor-cancel">Annulla</button>' +
          '<span style="color:#fff;font-weight:700;font-size:13.5px;font-family:\'IBM Plex Mono\';">' + (idx+1) + ' / ' + group.length + '</span>' +
          '<button id="editor-done">Fatto</button></div>' +
        '<div class="editor-preview-wrap" id="editor-preview">' +
          (idx > 0 ? '<button id="editor-prev" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:6;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:38px;height:38px;color:#fff;">&#8249;</button>' : '') +
          (idx < group.length-1 ? '<button id="editor-next" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:6;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:38px;height:38px;color:#fff;">&#8250;</button>' : '') +
          '<img id="editor-media" src="' + url + '">' +
          '<div id="editor-text-layer" style="position:absolute;inset:0;"></div>' +
        '</div>' +
        '<div class="editor-color-row" id="editor-color-row" style="display:none;"></div>' +
        '<div class="editor-topbar" style="padding-top:0;padding-bottom:0;">' +
          '<button id="editor-add-text">+ Testo</button><div></div>' +
        '</div>' +
        '<div class="editor-filter-rail" id="editor-filter-rail"></div>';

      screen.classList.add("active");

      var mediaNode = el("editor-media");
      var currentFilter = item.filterName || "none";
      mediaNode.style.filter = filterCssById(currentFilter);

      var filterRail = el("editor-filter-rail");
      filterRail.innerHTML = FILTERS.map(function(f){
        return '<div class="editor-filter-chip ' + (f.id === currentFilter ? "selected" : "") + '" data-filter="' + f.id + '">' +
          '<div class="editor-filter-swatch" style="filter:' + f.css + ';background-image:url(' + url + ');"></div>' +
          '<span>' + f.label + '</span></div>';
      }).join("");
      filterRail.querySelectorAll(".editor-filter-chip").forEach(function(chip){
        chip.addEventListener("click", function(){
          filterRail.querySelectorAll(".editor-filter-chip").forEach(function(c){ c.classList.remove("selected"); });
          chip.classList.add("selected");
          currentFilter = chip.getAttribute("data-filter");
          item.filterName = currentFilter;
          mediaNode.style.filter = filterCssById(currentFilter);
        });
      });

      var textLayer = el("editor-text-layer");
      var localOverlays = (item.textOverlays || []).slice();

      function drawOverlay(ov){
        var box = document.createElement("div");
        box.className = "editor-textbox";
        box.textContent = ov.text;
        box.style.left = ov.x + "%";
        box.style.top = ov.y + "%";
        box.style.color = ov.color;
        box.contentEditable = "true";
        box.dataset.id = ov.id;
        textLayer.appendChild(box);

        box.addEventListener("input", function(){ ov.text = box.textContent; item.textOverlays = localOverlays; });
        box.addEventListener("focus", function(){ setActiveBox(box, ov); });

        var dragging = false, offX = 0, offY = 0;
        function startDrag(clientX, clientY){
          dragging = true;
          setActiveBox(box, ov);
          var rect = box.getBoundingClientRect();
          offX = clientX - (rect.left + rect.width/2);
          offY = clientY - (rect.top + rect.height/2);
        }
        function moveDrag(clientX, clientY){
          if(!dragging) return;
          var wrapRect = textLayer.getBoundingClientRect();
          var x = ((clientX - offX - wrapRect.left) / wrapRect.width) * 100;
          var y = ((clientY - offY - wrapRect.top) / wrapRect.height) * 100;
          x = Math.max(4, Math.min(96, x));
          y = Math.max(4, Math.min(96, y));
          box.style.left = x + "%";
          box.style.top = y + "%";
          ov.x = x; ov.y = y;
        }
        function endDrag(){ dragging = false; item.textOverlays = localOverlays; }

        box.addEventListener("touchstart", function(e){ startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
        box.addEventListener("touchmove", function(e){ moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
        box.addEventListener("touchend", endDrag);
        box.addEventListener("mousedown", function(e){ startDrag(e.clientX, e.clientY); });
        window.addEventListener("mousemove", function(e){ moveDrag(e.clientX, e.clientY); });
        window.addEventListener("mouseup", endDrag);

        return box;
      }

      function setActiveBox(box, ov){
        textLayer.querySelectorAll(".editor-textbox").forEach(function(b){ b.classList.remove("editing"); });
        box.classList.add("editing");
        var colorRow = el("editor-color-row");
        colorRow.style.display = "flex";
        colorRow.innerHTML = TEXT_COLORS.map(function(c){
          return '<div class="editor-color-swatch ' + (ov.color === c ? "selected" : "") + '" style="background:' + c + ';" data-color="' + c + '"></div>';
        }).join("") + '<div class="editor-color-swatch" style="background:transparent;border-color:var(--danger);display:flex;align-items:center;justify-content:center;color:var(--danger);font-size:14px;" id="editor-del-text">&times;</div>';
        colorRow.querySelectorAll("[data-color]").forEach(function(sw){
          sw.addEventListener("click", function(){
            var c = sw.getAttribute("data-color");
            ov.color = c;
            box.style.color = c;
            item.textOverlays = localOverlays;
            colorRow.querySelectorAll(".editor-color-swatch").forEach(function(s){ s.classList.remove("selected"); });
            sw.classList.add("selected");
          });
        });
        el("editor-del-text").addEventListener("click", function(){
          box.remove();
          localOverlays = localOverlays.filter(function(o){ return o.id !== ov.id; });
          item.textOverlays = localOverlays;
          colorRow.style.display = "none";
        });
      }

      localOverlays.forEach(drawOverlay);
      item.textOverlays = localOverlays;

      el("editor-add-text").addEventListener("click", function(){
        var ov = { id: "t" + Date.now(), text: "Testo", x: 50, y: 50, color: "#ffffff" };
        localOverlays.push(ov);
        item.textOverlays = localOverlays;
        var box = drawOverlay(ov);
        setActiveBox(box, ov);
        box.focus();
        document.execCommand && document.execCommand("selectAll", false, null);
      });

      var prevBtn = el("editor-prev");
      var nextBtn = el("editor-next");
      if(prevBtn) prevBtn.addEventListener("click", function(){ idx -= 1; render(); });
      if(nextBtn) nextBtn.addEventListener("click", function(){ idx += 1; render(); });

      el("editor-cancel").addEventListener("click", function(){ finish(); });
      el("editor-done").addEventListener("click", function(){ finish(); });
    }

    function finish(){
      if(currentUrl) URL.revokeObjectURL(currentUrl);
      screen.classList.remove("active");
      screen.innerHTML = "";
    }

    render();
  }
